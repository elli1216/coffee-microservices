server:
  port: 8083

spring:
  application:
    name: order-service

  config:
    import: configserver:http://localhost:8888

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      coffeeBreaker:
        sliding-window-size: 5
        minimum-number-of-calls: 1 
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s 

management:
  endpoints:
    web:
      exposure:
        include: refresh, health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    circuitbreakers:
      enabled: true
    circuitbreakerevents:
      enabled: true